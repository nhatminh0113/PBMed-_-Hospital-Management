{% extends 'receptionist/base.html' %}
{% block title %}Đăng ký khám tại quầy{% endblock %}
{% block page_title %}Đăng ký khám tại quầy{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card shadow-sm">
      <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
        <h5 class="fw-bold mb-0" style="color:#000;"><i class="bi bi-person-plus me-2"></i>Đăng ký khám trực tiếp</h5>
        <a href="{% url 'receptionist_appointments' %}" class="btn btn-sm btn-outline-dark">
          <i class="bi bi-arrow-left"></i> Quay lại
        </a>
      </div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-bold" style="color:#000;">Họ tên bệnh nhân <span class="text-danger">*</span></label>
              <input type="text" name="full_name" class="form-control" placeholder="Nguyễn Văn A" required
                     value="{{ form_data.full_name|default:'' }}">
            </div>
            <div class="col-md-3">
              <label class="form-label fw-bold" style="color:#000;">Năm sinh <span class="text-danger">*</span></label>
              <input type="number" name="birth_year" class="form-control" placeholder="1990" required
                     value="{{ form_data.birth_year|default:'' }}">
            </div>
            <div class="col-md-3">
              <label class="form-label fw-bold" style="color:#000;">Giới tính</label>
              <select name="gender" class="form-select">
                <option value="Male" {% if form_data.gender == 'Male' %}selected{% endif %}>Nam</option>
                <option value="Female" {% if form_data.gender == 'Female' %}selected{% endif %}>Nữ</option>
              </select>
            </div>
          </div>

          <div class="row g-3 mt-1">
            <div class="col-md-6">
              <label class="form-label fw-bold" style="color:#000;">Số điện thoại <span class="text-danger">*</span></label>
              <input type="tel" name="phone" class="form-control" placeholder="0912345678" required
                     value="{{ form_data.phone|default:'' }}">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold" style="color:#000;">Bác sĩ <span class="text-danger">*</span></label>
              <select name="doctor_id" class="form-select" required>
                <option value="">-- Chọn bác sĩ --</option>
                {% for doc in doctors %}
                <option value="{{ doc.pk }}" {% if form_data.doctor_id|stringformat:"s" == doc.pk|stringformat:"s" %}selected{% endif %}>
                  {{ doc.user.last_name }} {{ doc.user.first_name }} - {{ doc.specialty.name }}
                </option>
                {% endfor %}
              </select>
            </div>
          </div>

          <div class="row g-3 mt-1">
            <div class="col-md-5">
              <label class="form-label fw-bold" style="color:#000;">Ngày hẹn <span class="text-danger">*</span></label>
              <input type="date" name="start_date" class="form-control" required
                     value="{{ form_data.start_date|default:'' }}">
            </div>
            <div class="col-md-3">
              <label class="form-label fw-bold" style="color:#000;">Giờ <span class="text-danger">*</span></label>
              <select name="time" class="form-select" required>
                <option value="">-- Chọn giờ --</option>
                {% for t in times %}
                <option value="{{ t }}" {% if form_data.time == t %}selected{% endif %}>{{ t }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-bold" style="color:#000;">Ghi chú</label>
              <input type="text" name="summary" class="form-control" placeholder="Khám tổng quát"
                     value="{{ form_data.summary|default:'Khám tại quầy' }}">
            </div>
          </div>

          <div class="mt-4">
            <button type="submit" class="btn btn-dark px-4">
              <i class="bi bi-check-lg"></i> Đăng ký khám
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
