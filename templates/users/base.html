{% load static %}

<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}{% endblock title %} - PBMed</title>
    <link rel="icon" type="image/x-icon" href="{% static 'img/icon_app.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Be Vietnam Pro', sans-serif; background: #f5f7fa; }
      .card { border: none; border-radius: 12px; }
      .btn { border-radius: 8px; font-weight: 500; }
      .form-control { border-radius: 8px !important; }
    </style>
  </head>

  <body>
    <section class="h-100">
      <div class="container h-100">
        <div class="row justify-content-sm-center h-100">
          <div class="col-xxl-4 col-xl-5 col-lg-5 col-md-7 col-sm-9">
            <div class="text-center my-4">
              <div style="font-family:'Be Vietnam Pro','Inter',sans-serif;font-weight:800;font-size:32px;letter-spacing:-0.5px;background:linear-gradient(135deg,#0EA5E9,#0284C7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:inline-block;">
                PB<span style="color:#0EA5E9;background:linear-gradient(135deg,#0EA5E9,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Med</span>
              </div>
              <div style="font-size:10px;color:#64748b;letter-spacing:2px;text-transform:uppercase;margin-top:-4px;">Healthcare Platform</div>
            </div>
            {% block content %}{% endblock content %}
            <div class="text-center my-5 text-dark">
              Copyright &copy; 2026 &mdash; nhatminh01
            </div>
          </div>
        </div>
      </div>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
