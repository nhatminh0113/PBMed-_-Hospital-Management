{% extends 'users/base.html' %} {% block content %}
<div class="card shadow-lg">
  <div class="card-body p-5">
    <h1 class="fs-4 card-title fw-bold mb-4">Đặt lại mật khẩu</h1>
    <form
      method="POST"
      class="needs-validation"
      novalidate=""
      autocomplete="off"
    >
      {% csrf_token %}
      <div class="mb-3">
		<div class="card-body p-5">
			{% if errorlogin %}
		  <div class="alert alert-danger" role="alert">
			Thông tin không chính xác
		  </div>
		  {% endif %}
        <label class="mb-2 text-dark" for="password">Mật khẩu mới</label>
        <input
          id="password"
          type="password"
          class="form-control"
          name="password"
          value=""
          required
          autofocus
        />
        <div class="invalid-feedback">Vui lòng nhập mật khẩu</div>
      </div>

      <div class="mb-3">
        <label class="mb-2 text-dark" for="password-confirm"
          >Xác nhận mật khẩu</label
        >
        <input
          id="password-confirm"
          type="password"
          class="form-control"
          name="conf_password"
          required
        />
        <div class="invalid-feedback">Vui lòng xác nhận mật khẩu mới</div>
      </div>

      <div class="d-flex align-items-center">
        <button type="submit" class="btn btn-primary ms-auto">
          Đặt lại mật khẩu
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock content %}
